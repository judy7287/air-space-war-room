(function(){
  var PW_HASH = '0348606cfca0c5eeff038e34dc7908fe6e9b71a0'; // sha1("airspace-salt" + password)
  function sha1(msg){
    function rotl(n,s){return (n<<s)|(n>>>(32-s));}
    var msgBytes = unescape(encodeURIComponent(msg));
    var msgLen = msgBytes.length;
    var wordArray = [];
    for(var i=0;i<msgLen;i++){
      wordArray[i>>2] |= msgBytes.charCodeAt(i) << (24-(i%4)*8);
    }
    wordArray[msgLen>>2] |= 0x80 << (24-(msgLen%4)*8);
    wordArray[(((msgLen+8)>>6)+1)*16-1] = msgLen*8;
    var H0=0x67452301,H1=0xEFCDAB89,H2=0x98BADCFE,H3=0x10325476,H4=0xC3D2E1F0;
    for(var blockStart=0;blockStart<wordArray.length;blockStart+=16){
      var w=wordArray.slice(blockStart,blockStart+16);
      for(var t=16;t<80;t++){
        w[t]=rotl(w[t-3]^w[t-8]^w[t-14]^w[t-16],1);
      }
      var a=H0,b=H1,c=H2,d=H3,e=H4;
      for(t=0;t<80;t++){
        var f,k;
        if(t<20){f=(b&c)|((~b)&d);k=0x5A827999;}
        else if(t<40){f=b^c^d;k=0x6ED9EBA1;}
        else if(t<60){f=(b&c)|(b&d)|(c&d);k=0x8F1BBCDC;}
        else{f=b^c^d;k=0xCA62C1D6;}
        var temp=(rotl(a,5)+f+e+k+(w[t]|0))|0;
        e=d;d=c;c=rotl(b,30);b=a;a=temp;
      }
      H0=(H0+a)|0;H1=(H1+b)|0;H2=(H2+c)|0;H3=(H3+d)|0;H4=(H4+e)|0;
    }
    function toHex(n){return (n>>>0).toString(16).padStart(8,'0');}
    return toHex(H0)+toHex(H1)+toHex(H2)+toHex(H3)+toHex(H4);
  }
  function unlock(){
    document.getElementById('gate').style.display='none';
    document.getElementById('app').style.display='block';
    try{ sessionStorage.setItem('airspace_auth','1'); }catch(e){}
  }
  try{
    if(sessionStorage.getItem('airspace_auth')==='1'){ unlock(); }
  }catch(e){}
  function tryPw(){
    var val = document.getElementById('gate-pw').value;
    if(sha1('airspace-salt'+val) === PW_HASH){
      unlock();
    } else {
      document.getElementById('gate-err').textContent = '密碼錯誤，請再試一次';

    }
  }

    if(ev.key === 'Enter') tryPw();
  });
})();
